<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Iconos -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    background:#f3f3f3;
    font-family:'fredoka', fredoka, cursive;
}

.contenedor{
    width:220px;
    margin:auto;
    padding-top:10px;
    background:#ffffff97;
    font-family:'fredoka', fredoka, cursive;}

.carrito{
    text-align:right;
    font-size:20px;
    margin-bottom:15px;}

.imagen-principal{
    width:150px;
    height:150px;
    border:1px solid #000;
    margin:auto;
    background:#ddd;
}

.titulo{
    text-align:center;
    font-weight:bold;
    font-family:'fredoka', fredoka, cursive;
    font-size:32px;
    margin-top:10px;
}

.card-helado{
    background:#fd9f9d97;
    border-radius:3px;
    padding:10px;
    display:flex;
    align-items:center;
    font-family:'fredoka', fredoka, cursive;

    justify-content:space-between;
    color:rgb(0, 0, 0);
    margin-top:30px;
}

.mini-img{
    width:50px;
    height:50px;
    background:#ddd;
    border:1px solid #000;
    
}

.info{
    flex:1;
    margin-left:10px;
}

.info h5{
    margin:0;
    font-size:14px;
}

.info p{
    margin:0;
    font-size:10px;
}

.footer{
    margin-top:60px;
    text-align:center;
}

.bienvenida{
    background:white;
    display:inline-block;
    padding:5px 10px;
    border-radius:5px;
    font-size:10px;
    font-family: fredoka, cursive;
}

.logo{
    margin-top:10px;
    font-size:30px;
    color:#ff7b00;
}

</style>
</head>

<body>

<div class="contenedor">

    <!-- carrito -->
    <div class="carrito">
        <i class="fa-solid fa-cart-shopping"></i>
    </div>

    <!-- imagen -->
    <div class="imagen-principal"></div>

    <!-- titulo -->
    <h1 class="titulo">Heladería</h1>

    <!-- card -->
    <div class="card-helado">

        <div class="mini-img"></div>

        <div class="info">
            <h5>HELADOS</h5>
            <p>Ver opciones</p>
        </div>

        <i class="fa-solid fa-chevron-right" onclick="window.open('sabores.html')"></i>

    </div>

    <!-- footer -->
    <div class="footer">

        <p class="bienvenida">
            ¡Bienvenido al lugar donde los antojos se vuelven realidad!
        </p>
        

        <div class="logo">
            🍦
        </div>

    </div>

</div>

</body>
</html>
