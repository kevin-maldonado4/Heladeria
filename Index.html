<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heladería Dulce Frío</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

  <!-- Encabezado con ícono de carrito -->
  <header class="d-flex justify-content-between align-items-center p-3">
    <h1 class="logo">Heladería</h1>
    <a href="carrito.html" class="cart-icon">
      <img src="imagenes/shopping-cart.png" alt="Carrito" width="28">
    </a>
  </header>

  <!-- Imagen principal -->
  <section class="hero text-center">
    <img src="imagenes/vecteezy_a-colorful-array-of-ice-cream-scoops-a-perfect-dessert-to_71610751.jpeg" alt="Heladería" class="hero-img" width="400" height="250">
    <h2 class="mt-3">Heladería</h2>
  </section>

  <!-- Botón de navegación a productos -->
  <section class="productos text-center mt-4">
    <div class="card mx-auto" style="width: 18rem;">
      <img src="imagenes/canva-hands-of-two-people-holding-ice-cream-cones-MAGEiagofgw.jpg" class="card-img-top" alt="Helado">
      <div class="card-body">
        <h5 class="card-title">HELADOS</h5>
        <p class="card-text">Ver opciones</p>
        <a href="productos.html" class="btn btn-primary">→</a>
      </div>
    </div>
  </section>

  <!-- Mensaje de bienvenida -->
  <footer class="text-center mt-5">
    <p class="bienvenida">¡Bienvenido al lugar donde los antojos se vuelven realidad!</p>
    
  </footer>

</body>
</html>
